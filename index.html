<!doctype html>
<html>

<head>
  <title>My First Three.js App</title>
  <style>
    body {
      margin: 0;
    }
    
    #loading {
      position: fixed;
      inset: 0;
      
      display: flex;
      justify-content: center;
      align-items: center;
      
      background: black;
      color: white;
      font-size: 1.5rem;
    }
  </style>
</head>

<body>
  <div id="loading">
    Loading Model...
  </div>
  
  <canvas id="bg">
  
  </canvas>
  <script type="importmap">
    {
  "imports": {
    "three": "https://unpkg.com/three@0.179.1/build/three.module.js"
  }
}
</script>
  <script type="module">
    import * as THREE from "three";
    
    import { OrbitControls } from "https://unpkg.com/three@0.179.1/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.179.1/examples/jsm/loaders/GLTFLoader.js";
    const canvas = document.getElementById("bg");
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      75,
      innerWidth / innerHeight,
      0.1,
      1000
    );
    const renderer = new THREE.WebGLRenderer({ canvas });
    renderer.shadowMap.enabled = true;
    renderer.setSize(window.innerWidth, window.innerHeight);
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);
    camera.position.set(5,5,10);
    
    const light = new THREE.DirectionalLight(
      0xffffff,
      1.5
    );
    
    light.position.set(5, 5, 5);
    
    scene.add(light);
    
    scene.add(
      new THREE.AmbientLight(
        0xffffff,
        0.2
      )
    );
    scene.background = new THREE.Color(0x909090);
    const loading = document.getElementById("loading");
    
    const glLoader = new GLTFLoader();
    let model;
    glLoader.load(
      "model.glb",
      (gltf) => {
        gltf.scene.position.set(0, 0, 0);
        gltf.scene.scale.set(
          15,
          15,
          15
        );
        loading.style.display = "none";
        model = gltf.scene;
        model.castShadow = true;
        model.traverse((child)=>{
          if(child.isMesh){
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        console.log(model);
        scene.add(model);
      },
      (xhr) => {
        const percent = Math.round((xhr.loaded / xhr.total) * 100);
        loading.textContent = `Loading ${percent}%`;
      }
    );
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      if(model){
      model.rotation.y +=0.01;
      }
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>

</html>
