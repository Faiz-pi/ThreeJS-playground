<!doctype html>
<html>

<head>
  <title>My First Three.js App</title>
  <style>
    body {
      margin: 0;
    }
  </style>
</head>

<body>
  <canvas id="bg">
  
  </canvas>
  <script type="importmap">
    {
  "imports": {
    "three": "https://unpkg.com/three@0.179.1/build/three.module.js"
  }
}
</script>
  <script type="module">
    import * as THREE from "three";
    
    import { OrbitControls } from "https://unpkg.com/three@0.179.1/examples/jsm/controls/OrbitControls.js";
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      75,
      innerWidth / innerHeight,
      0.1,
      1000
    );
    const canvas = document.querySelector("#bg");
    const renderer = new THREE.WebGLRenderer({
      canvas
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const controls = new OrbitControls(
      camera,
      canvas
    );
    controls.enableDamping = true;
    controls.target.set(0,0,0);
    camera.position.set(0,5,10)
    
    let loader = new THREE.TextureLoader();
    const earthTexture = loader.load("earth.jpg");
    // earth
    const sphereGeometry = new THREE.SphereGeometry(1, 32, 32);
    const sphereMaterial = new THREE.MeshStandardMaterial({
      map: earthTexture
    });
    
    const earth = new THREE.Mesh(sphereGeometry, sphereMaterial);
    earth.rotation.z = 0.41;
    earth.position.x = 5;
    
    // Sun
    const sunTexture = loader.load("sun.jpg");
    const sunGeometry = new THREE.SphereGeometry(1, 32, 32);
    const sunMaterial = new THREE.MeshBasicMaterial({
      map: sunTexture
    });
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    scene.add(sun);
    
    // earth Grouping
    const earthGroup = new THREE.Group();
    earthGroup.add(earth);
    scene.add(earthGroup);
    // moon groupinv
    const moonGroup = new THREE.Group();
    earth.add(moonGroup);
    
    // moon
    const moonTexture = loader.load("moon.jpg");
    const moonGeometry = new THREE.SphereGeometry(0.35, 32, 32);
    const moonMaterial = new THREE.MeshStandardMaterial({
      map: moonTexture
    });
    const moon = new THREE.Mesh(moonGeometry, moonMaterial);
    moonGroup.add(moon);
    moon.position.x = 2;
    
    
    const light = new THREE.PointLight(0xffffff, 30,100);
    light.position.set(0,0,0);
    sun.add(light);
    const ambient = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambient);
    
    
    function animate() {
      requestAnimationFrame(animate);
      sun.rotation.y += 0.0025;
      earth.rotation.y += 0.01;
      earthGroup.rotation.y += 0.005;
      moonGroup.rotation.y += 0.02;
      moon.rotation.y += 0.005;
      controls.update();
      
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>

</html>
