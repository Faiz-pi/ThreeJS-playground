<!doctype html>
<html>

<head>
  <title>My First Three.js App</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      user-select: none;
    }
    
    #bottomFade {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 35vh;
      
      background: linear-gradient(to top,
          rgba(0, 0, 0, .8),
          transparent);
      
      pointer-events: none;
    }
    
    /* Movement Controller */
    
    #controller {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 10;
      
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    
    .row {
      display: flex;
      gap: 12px;
    }
    
    #controller button,
    #shift,
    #jump {
      
      width: 70px;
      height: 70px;
      
      border: none;
      border-radius: 50%;
      
      background: rgba(255, 255, 255, .2);
      
      color: white;
      font-size: 28px;
      
      backdrop-filter: blur(10px);
      
      box-shadow: 0 5px 15px rgba(0, 0, 0, .3);
    }
    
    #controller button:active,
    #shift:active,
    #jump:active {
      
      transform: scale(.92);
      background: rgba(255, 255, 255, .35);
    }
    
    /* Sprint Button */
    
    #shift {
      
      position: fixed;
      
      right: 20px;
      bottom: 40px;
      
      width: 85px;
      height: 85px;
      
      font-size: 18px;
      font-weight: bold;
      
      z-index: 10;
    }
    
    #jump {
      position: fixed;
      right: 20px;
      bottom: 150px;
      width: 85px;
      height: 85px;
      font-size: 18px;
      font-weight: bold;
      
      z-index: 10;
    }
  </style>
</head>

<body>
  <div id="controller">
    <button id="forward">▲</button>
    
    <div class="row">
      <button id="left">◀</button>
      <button id="right">▶</button>
    </div>
    
    <button id="backward">▼</button>
  </div>
  
  <button id="shift">Sprint</button>
  <button id="jump">Jump</button>
  
  <div id="bottomFade"></div>
  
  <canvas id="bg"></canvas>
  <script type="importmap">
    {
  "imports": {
    "three": "https://unpkg.com/three@0.179.1/build/three.module.js"
  }
}
</script>
  <script type="module">
    import * as THREE from "three";
    
    import { OrbitControls } from "https://unpkg.com/three@0.179.1/examples/jsm/controls/OrbitControls.js";
    const canvas = document.getElementById("bg");
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      75,
      innerWidth / innerHeight,
      0.1,
      1000
    );
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.shadowMap.enabled = true;
    renderer.setSize(window.innerWidth, window.innerHeight);
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
    renderer.shadowMap.enabled = true;
    // const controls = new OrbitControls(camera, canvas);
    // controls.enableDamping = true;
    //  controls.target.set(0, 0, 0);
    camera.position.y = 5;
    camera.position.z = 5;
    
    const ambient = new THREE.AmbientLight(
      0xffffff,
      0.7
    );
    
    scene.add(ambient);
    
    const sun = new THREE.DirectionalLight(
      0xffffff,
      3
    );
    
    sun.position.set(30, 40, 20);
    sun.castShadow = true;
    scene.add(sun);
    scene.background = new THREE.Color(0x88cfff);
    scene.fog = new THREE.Fog(
      0xddefff,
      30,
      120
    );
    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshStandardMaterial({
      color: 0xffffff
    });
    const box = new THREE.Mesh(geometry, material);
    box.position.y = 0.5;
    box.castShadow = true;
    scene.add(box);
    const key = {
      forward: false,
      backward: false,
      left: false,
      right: false,
      shift: false
    }
    
    const forwardBtn = document.getElementById("forward");
    const leftBtn = document.getElementById("left");
    const rightBtn = document.getElementById("right");
    const backwardBtn = document.getElementById("backward");
    const shiftBtn = document.getElementById("shift");
    const jumpBtn = document.getElementById("jump");
    
    shiftBtn.addEventListener("touchstart", () => {
      key.shift = true
    });
    shiftBtn.addEventListener("touchend", () => {
      key.shift = false
    });
    jumpBtn.addEventListener("touchend", () => {
      key.jump = false
    });
    jumpBtn.addEventListener("touchstart", () => {
      key.jump = true
    });
    
    forwardBtn.addEventListener("touchstart", () => {
      key.forward = true
    });
    forwardBtn.addEventListener("touchend", () => {
      key.forward = false
    });
    
    backwardBtn.addEventListener("touchstart", () => {
      key.backward = true
    });
    backwardBtn.addEventListener("touchend", () => {
      key.backward = false
    });
    
    leftBtn.addEventListener("touchstart", () => {
      key.left = true
    });
    leftBtn.addEventListener("touchend", () => {
      key.left = false
    });
    
    rightBtn.addEventListener("touchstart", () => {
      key.right = true
    });
    rightBtn.addEventListener("touchend", () => {
      key.right = false
    });
    
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(500, 500),
      new THREE.MeshStandardMaterial({
        color: 0x202633
      })
    );
    
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);
    
    const grid = new THREE.GridHelper(
      500,
      100,
      0x4a5568,
      0x323b4b
    );
    
    scene.add(grid);
    const clock = new THREE.Clock();
    const moveSpeed = 5;
    const turnSpeed = 2;
    console.log(box.position.y);
    let velocityY = 0;
    const jumpForce = 10;
    const gravity = -20;
    let isGrounded = true;
    
    function animate() {
      requestAnimationFrame(animate);
      //controls.update();
      const delta = clock.getDelta();
      const sprint = moveSpeed * 2;
      if (key.left) {
        box.rotation.y += turnSpeed * delta;
      }
      if (key.right) {
        box.rotation.y -= turnSpeed * delta;
      }
      if (key.forward && key.shift) {
        box.translateZ(-sprint * delta);
      } else if (key.forward) {
        box.translateZ(-moveSpeed * delta);
      }
      if (key.backward && key.shift) {
        box.translateZ(sprint * delta);
      } else if (key.backward) {
        box.translateZ(moveSpeed * delta);
      }
      if (key.jump && isGrounded) {
        velocityY = jumpForce;
        isGrounded = false;
        key.jump = false;
      }
      if (!isGrounded) {
        velocityY += gravity * delta;
        box.position.y += velocityY * delta;
      }
      if(box.position.y <= 0.5){
        velocityY = 0;
        isGrounded = true;
        box.position.y = 0.5;
      }
      camera.position.x = box.position.x;
      camera.position.y = box.position.y + 5;
      camera.position.z = box.position.z + 8;
      camera.lookAt(box.position)
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>

</html>
