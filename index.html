<!doctype html>
<html>

<head>
  <title>My First Three.js App</title>
  <style>
    body {
      margin: 0;
    }
    
    #controller {
      position: fixed;
      bottom: 25px;
      left: 25px;
      z-index: 100;
    }
    
    #move-pad {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    
    .middle-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .center {
      width: 30px;
      height: 30px;
    }
    
    #move-pad button {
      width: 70px;
      height: 70px;
      
      border: none;
      border-radius: 22px;
      
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      
      color: white;
      font-size: 30px;
      font-weight: bold;
      
      box-shadow:
        0 8px 25px rgba(0, 0, 0, 0.35),
        inset 0 1px 2px rgba(255, 255, 255, 0.2);
      
      transition: transform .1s, background .2s;
    }
    
    #move-pad button:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.28);
    }
    
    #move-pad button::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
    }
    
    #bottomFade {
      
      position: fixed;
      
      left: 0;
      bottom: 0;
      
      width: 100%;
      height: 40vh;
      
      pointer-events: none;
      
      background: linear-gradient(to top,
          rgba(6, 9, 17, .98),
          rgba(6, 9, 17, .75),
          rgba(6, 9, 17, .35),
          transparent);
      
      z-index: 5;
      
    }
  </style>
</head>

<body>
  <div id="controller">
    <div id="move-pad">
      <button id="forward">▲</button>
      
      <div class="middle-row">
        <button id="left">◀</button>
        <div class="center"></div>
        <button id="right">▶</button>
      </div>
      
      <button id="backward">▼</button>
    </div>
  </div>
  <div id="bottomFade"></div>
  <canvas id="bg">
  
  </canvas>
  <script type="importmap">
    {
  "imports": {
    "three": "https://unpkg.com/three@0.179.1/build/three.module.js"
  }
}
</script>
  <script type="module">
    import * as THREE from "three";
    
    import { OrbitControls } from "https://unpkg.com/three@0.179.1/examples/jsm/controls/OrbitControls.js";
    const canvas = document.getElementById("bg");
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      75,
      innerWidth / innerHeight,
      0.1,
      1000
    );
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.shadowMap.enabled = true;
    renderer.setSize(window.innerWidth, window.innerHeight);
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
    // const controls = new OrbitControls(camera, canvas);
    // controls.enableDamping = true;
    //  controls.target.set(0, 0, 0);
    camera.position.y = 5;
    camera.position.z = 5;
    
    const ambient = new THREE.AmbientLight(
      0xffffff,
      0.7
    );
    
    scene.add(ambient);
    
    const sun = new THREE.DirectionalLight(
      0xffffff,
      3
    );
    
    sun.position.set(30, 40, 20);
    
    scene.add(sun);
    scene.background = new THREE.Color(0x88cfff);
    scene.fog = new THREE.Fog(
      0xddefff,
      30,
      120
    );
    const geometry = new THREE.BoxGeometry();
    const material = new THREE.MeshStandardMaterial({
      color: 0xffffff
    });
    const box = new THREE.Mesh(geometry, material);
    box.position.y = 0.5;
    scene.add(box);
    
    const key = {
      forward: false,
      backward: false,
      left: false,
      right: false
    }
    
    const forwardBtn = document.getElementById("forward");
    const leftBtn = document.getElementById("left");
    const rightBtn = document.getElementById("right");
    const backwardBtn = document.getElementById("backward");
    
    forwardBtn.addEventListener("touchstart", () => {
      key.forward = true
    });
    forwardBtn.addEventListener("touchend", () => {
      key.forward = false
    });
    
    backwardBtn.addEventListener("touchstart", () => {
      key.backward = true
    });
    backwardBtn.addEventListener("touchend", () => {
      key.backward = false
    });
    
    leftBtn.addEventListener("touchstart", () => {
      key.left = true
    });
    leftBtn.addEventListener("touchend", () => {
      key.left = false
    });
    
    rightBtn.addEventListener("touchstart", () => {
      key.right = true
    });
    rightBtn.addEventListener("touchend", () => {
      key.right = false
    });
    
    const moveSpeed = 5;
    const turnSpeed = 2;
    
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(500, 500),
      new THREE.MeshStandardMaterial({
        color: 0x202633
      })
    );
    
    ground.rotation.x = -Math.PI / 2;
    
    ground.receiveShadow = true;
    
    scene.add(ground);
    
    const grid = new THREE.GridHelper(
      500,
      100,
      0x4a5568,
      0x323b4b
    );
    
    scene.add(grid);
    const clock = new THREE.Clock();
    
    function animate() {
      requestAnimationFrame(animate);
      //controls.update();
      const delta = clock.getDelta();
      if (key.left) {
        box.rotation.y += turnSpeed * delta;
      }
      if (key.right) {
        box.rotation.y -= turnSpeed * delta;
      }
      if (key.forward) {
        box.translateZ(-moveSpeed * delta);
      }
      if (key.backward) {
        box.translateZ(moveSpeed * delta);
      }
      camera.position.x = box.position.x;
      camera.position.y = box.position.y + 5;
      camera.position.z = box.position.z + 8;
      camera.lookAt(box.position)
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>

</html>
