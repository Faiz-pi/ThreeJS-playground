<!doctype html>
<html>

<head>
  <title>My First Three.js App</title>
  <style>
    body {
      margin: 0;
    }
  </style>
</head>

<body>
  <canvas id="bg">
    
  </canvas>
  <script type="importmap">
    {
  "imports": {
    "three": "https://unpkg.com/three@0.179.1/build/three.module.js"
  }
}
</script>
  <script type="module">
    import * as THREE from "three";
    
    import { OrbitControls } from "https://unpkg.com/three@0.179.1/examples/jsm/controls/OrbitControls.js";
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
      75,
      innerWidth / innerHeight,
      0.1,
      1000
    );
    const canvas = document.querySelector("#bg");
    const renderer = new THREE.WebGLRenderer({
      canvas
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const controls = new OrbitControls(
      camera,
      canvas
    );
    controls.enableDamping = true;
    camera.position.z = 3;
    
    let loader = new THREE.TextureLoader();
    const earthTexture = loader.load("earth.jpg");
    
    const sphereGeometry = new THREE.SphereGeometry(1,32,32);
    const sphereMaterial = new THREE.MeshStandardMaterial({
      map: earthTexture
    });
    
    const earth = new THREE.Mesh(sphereGeometry, sphereMaterial);
    scene.add(earth);
    
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5,5,5);
    scene.add(light);
    const ambient = new THREE.AmbientLight(0xffffff, 0.2);
    scene.add(ambient);
    
    let angle = 0;
    
    function animate(){
      requestAnimationFrame(animate);
      earth.rotation.y += 0.01;
      earth.rotation.z = 0.41;
      angle += 0.01;
      light.position.y = 2;
      light.position.x = 5 * Math.cos(angle);
      light.position.z = 5 * Math.sin(angle);
      controls.update();
      
      renderer.render(scene,camera);
    }
    animate();
  </script>
</body>

</html>
